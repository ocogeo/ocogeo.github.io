<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ocogeo global</title>
    
    <!-- Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">

    <!-- Stick no Bills font (logo proto) -->
    <link href="https://fonts.cdnfonts.com/css/stick-no-bills" rel="stylesheet">
    
    <!-- tailwind cdn - replace -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- externalize css -->
    <style type="text/tailwindcss">  
      @theme {
        --font-display: "Geist", system-ui, sans-serif;  
      }
    </style>  

    <!-- externalize css -->
    <style>
      body {
        font-family: Geist;
      }

      .stick-no-bills {
        font-family: "Stick No Bills";
      }
    </style>
    
  </head>
  <body class="transition-all duration-500 bg-taupe-900 text-taupe-50" style="scroll-behavior: smooth;">
    <div class="h-screen w-screen relative">
      <div class="absolute top-0 left-7 p-5">
        <div class="text-9xl tracking-tighter font-black stick-no-bills">ocogeo</div>
        <div class="font-thin text-[small] tracking-tight mt-[-15pt] ml-1">a <span class="font-base">game</span> of many players</div>        
      </div>
      <div class="absolute bottom-0 left-7 p-5">
        <div class="font-thin text-[xx-small] tracking-tight">ocodo - iterative design and development - one commit at a time, an opus project.</div>
      </div>
    </div>
  </body>
</html>
